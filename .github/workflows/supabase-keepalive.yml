name: Supabase keepalive

# Free-tier Supabase projects pause after 7 days with no API activity.
# This pings the project's REST endpoint every 3 days (well under that
# window) so it never goes dormant while the trip is still months away.
on:
  schedule:
    - cron: "17 4 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -sf -o /dev/null "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
